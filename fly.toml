# fly.toml app configuration file generated for petbook on 2026-03-04T20:39:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'petbook'
primary_region = 'lhr'
console_command = '/code/manage.py shell'

[processes]
  # Náš hlavní webový server (který HTTP service už zná jako 'app')
  app = "gunicorn twitter_project.wsgi:application --bind 0.0.0.0:8000"
  
  # Náš nový Celery dělník
  worker = "celery -A petbook worker -l INFO"

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
