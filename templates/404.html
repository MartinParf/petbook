{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="text-8xl md:text-9xl mb-6 animate-bounce">🙀</div>
    
    <h1 class="text-4xl md:text-5xl font-extrabold text-stone-900 dark:text-white mb-4 tracking-tight">
        404 - Lost in the Park
    </h1>
    
    <p class="text-lg text-stone-500 dark:text-stone-400 mb-8 max-w-md mx-auto">
        We sniffed everywhere, but we couldn't find the page you're looking for. It might have chased a squirrel.
    </p>
    
    <a href="{% url 'tweets:feed' %}" class="bg-accent hover:bg-accent-hover text-white font-bold py-3.5 px-8 rounded-full shadow-lg transition-transform hover:-translate-y-1">
        Take me back home 🦴
    </a>
</div>
{% endblock %}
