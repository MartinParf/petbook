<!DOCTYPE html>
<html lang="en" 
      x-data="{ 
          darkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches),
          mobileMenuOpen: false 
      }" 
      x-init="$watch('darkMode', val => localStorage.setItem('theme', val ? 'dark' : 'light'))"
      :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetNet | {% block title %}Welcome{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cream: { DEFAULT: '#FDFBF7', dark: '#F0EBE1' },
                        softdark: { DEFAULT: '#1C1C1E', light: '#2C2C2E', border: '#3A3A3C' },
                        accent: { DEFAULT: '#D97757', hover: '#C46547' }
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-cream text-stone-800 dark:bg-softdark dark:text-stone-200 transition-colors duration-300 antialiased selection:bg-accent selection:text-white min-h-screen flex flex-col">

    <header class="sticky top-4 z-50 px-4 md:px-8 max-w-5xl mx-auto w-full">
        <nav class="bg-white/80 dark:bg-softdark-light/80 backdrop-blur-md shadow-sm border border-cream-dark dark:border-softdark-border rounded-3xl px-6 py-3 flex items-center justify-between transition-all duration-300">
            
            <a href="{% url 'tweets:feed' %}" class="text-xl font-bold tracking-tight text-accent flex items-center gap-2 hover:scale-105 transition-transform">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3c0 1.3.84 2.4 2 2.82V10H9.82C8.4 8.84 7 8 5.5 8 3.57 8 2 9.57 2 11.5c0 1.63 1.14 3 2.68 3.39L6.5 22h11l1.82-7.11c1.54-.39 2.68-1.76 2.68-3.39 0-1.93-1.57-3.5-3.5-3.5-1.5 0-2.9.84-4.32 2H13V7.82A3.001 3.001 0 0 0 12 2Z"/></svg>
                PetNet
            </a>

            <div class="hidden md:flex items-center gap-6 font-medium text-sm lg:text-base">
                <a href="{% url 'tweets:feed' %}" class="hover:text-accent dark:hover:text-accent transition-colors">Feed</a>
                
                {% if request.user.is_authenticated %}
                    <a href="{% url 'tweets:user_gallery' request.user.username %}" class="hover:text-accent transition-colors">My Portfolio 🐾</a>
                    <a href="{% url 'users:edit_profile' %}" class="hover:text-accent transition-colors">Edit Profile</a>
                    <a href="{% url 'users:logout' %}" class="hover:text-red-500 text-stone-500 transition-colors">Log Out</a>
                    
                    <a href="{% url 'tweets:create_post' %}" class="bg-accent hover:bg-accent-hover text-white px-5 py-2 rounded-full transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                        + Add Post
                    </a>
                
                {% else %}
                    <a href="{% url 'users:login' %}" class="hover:text-accent transition-colors">Log In</a>
                    <a href="{% url 'users:register' %}" class="bg-accent hover:bg-accent-hover text-white px-5 py-2 rounded-full transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                        Sign Up
                    </a>
                {% endif %}
                
                <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-cream-dark dark:hover:bg-softdark-border transition-colors outline-none">
                    <svg x-show="darkMode" class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg x-show="!darkMode" class="w-5 h-5 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>

            <div class="md:hidden flex items-center gap-4">
                <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-cream-dark dark:hover:bg-softdark-border transition-colors">
                    <svg x-show="darkMode" class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg x-show="!darkMode" class="w-5 h-5 text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="text-stone-800 dark:text-stone-200 focus:outline-none">
                    <svg x-show="!mobileMenuOpen" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <svg x-show="mobileMenuOpen" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </nav>

        <div x-show="mobileMenuOpen" 
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 -translate-y-4"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-4"
             @click.away="mobileMenuOpen = false"
             class="md:hidden mt-2 bg-white/95 dark:bg-softdark-light/95 backdrop-blur-md border border-cream-dark dark:border-softdark-border rounded-2xl shadow-lg p-4 flex flex-col gap-3 font-medium text-center">
            
            <a href="{% url 'tweets:feed' %}" class="block px-4 py-3 hover:bg-cream-dark dark:hover:bg-softdark rounded-xl transition-colors">Feed</a>
            
            {% if request.user.is_authenticated %}
                <a href="{% url 'tweets:user_gallery' request.user.username %}" class="block px-4 py-3 hover:bg-cream-dark dark:hover:bg-softdark rounded-xl transition-colors">My Portfolio 🐾</a>
                <a href="{% url 'users:edit_profile' %}" class="block px-4 py-3 hover:bg-cream-dark dark:hover:bg-softdark rounded-xl transition-colors">Edit Profile</a>
                <a href="{% url 'users:logout' %}" class="block px-4 py-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors">Log Out</a>
                <div class="h-px bg-cream-dark dark:bg-softdark-border my-1"></div>
                <a href="{% url 'tweets:create_post' %}" class="block px-4 py-3 bg-accent text-white rounded-xl shadow-md">Add Post</a>
            
            {% else %}
                <a href="{% url 'users:login' %}" class="block px-4 py-3 hover:bg-cream-dark dark:hover:bg-softdark rounded-xl transition-colors">Log In</a>
                <a href="{% url 'users:register' %}" class="block px-4 py-3 bg-accent text-white rounded-xl shadow-md">Sign Up</a>
            {% endif %}
        </div>
    </header>

    <main class="flex-grow w-full max-w-3xl mx-auto mt-8 px-4 pb-12 relative z-10">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
